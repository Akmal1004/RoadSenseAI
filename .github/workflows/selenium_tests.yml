name: Selenium UI Tests – RoadSenseAI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Build the Vite app
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build RoadSenseAI (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RoadSenseAI/package-lock.json

      - name: Install dependencies
        working-directory: RoadSenseAI
        run: npm ci

      - name: Build
        working-directory: RoadSenseAI
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: RoadSenseAI/dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Selenium UI Tests
  # ═══════════════════════════════════════════════════════════════
  selenium-ui-tests:
    name: Selenium UI Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node (for vite preview) ────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RoadSenseAI/package-lock.json

      - name: Install Node deps
        working-directory: RoadSenseAI
        run: npm ci

      # ── 3. Restore built dist ─────────────────────────────────
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: RoadSenseAI/dist/

      # ── 4. Chrome (use the action – most reliable method) ─────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Chrome version
        run: google-chrome --version

      # ── 5. Python + Selenium ──────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Selenium deps
        run: pip install -r tests/selenium/requirements.txt

      # ── 6. Start Vite preview on port 4173 ───────────────────
      - name: Start Vite preview server
        working-directory: RoadSenseAI
        run: |
          npx vite preview --port 4173 --host 0.0.0.0 &
          echo "Waiting for server..."
          timeout 30 bash -c 'until curl -sf http://localhost:4173 > /dev/null; do sleep 1; done'
          echo "Server is up!"

      # ── 7. Run all Selenium tests ────────────────────────────
      - name: Run Selenium tests
        run: |
          pytest tests/selenium/ \
            --base-url=http://localhost:4173 \
            --html=tests/selenium/selenium-report.html \
            --self-contained-html \
            -v \
            --tb=short \
            2>&1 | tee tests/selenium/selenium-output.txt
        continue-on-error: true

      # ── 8. Print summary ──────────────────────────────────────
      - name: Test summary
        if: always()
        run: |
          echo "============================================"
          echo "   RoadSenseAI Selenium Test Summary"
          echo "============================================"
          tail -50 tests/selenium/selenium-output.txt || true

      # ── 9. Upload HTML report ─────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-html-report
          path: tests/selenium/selenium-report.html

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-log
          path: tests/selenium/selenium-output.txt
