name: Selenium UI Tests – RoadSenseAI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build the Vite app
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build RoadSenseAI (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RoadSenseAI/package-lock.json

      - name: Install dependencies
        working-directory: RoadSenseAI
        run: npm ci

      - name: Build Vite production bundle
        working-directory: RoadSenseAI
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: RoadSenseAI/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Run Selenium UI Tests
  # ─────────────────────────────────────────────────────────────────────────────
  selenium-ui-tests:
    name: 🧪 Selenium UI Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node (needed for vite preview) ────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: RoadSenseAI/package-lock.json

      - name: Install Node dependencies
        working-directory: RoadSenseAI
        run: npm ci

      # ── 3. Restore dist ───────────────────────────────────────────────────────
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: RoadSenseAI/dist/

      # ── 4. Python + Selenium ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Selenium dependencies
        working-directory: tests/selenium
        run: pip install -r requirements.txt

      # ── 5. Google Chrome ──────────────────────────────────────────────────────
      - name: Install Google Chrome (latest stable)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Print Chrome version
        run: google-chrome --version

      # ── 6. Start Vite preview server ──────────────────────────────────────────
      - name: Start Vite preview server on :4173
        working-directory: RoadSenseAI
        run: |
          nohup npx vite preview --port 4173 --host 0.0.0.0 &
          echo "⏳ Waiting for Vite preview to be ready..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4173 || true)
            echo "  Attempt $i – HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Server ready!" && break
            sleep 2
          done

      # ── 7. Run all Selenium tests ─────────────────────────────────────────────
      - name: Run Selenium test suite
        working-directory: tests/selenium
        run: |
          pytest \
            --base-url=http://localhost:4173 \
            --html=selenium-report.html \
            --self-contained-html \
            -v \
            --tb=short \
            -q \
            2>&1 | tee selenium-output.txt
        continue-on-error: true

      # ── 8. Print summary ──────────────────────────────────────────────────────
      - name: Print test summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║     RoadSenseAI – Selenium Test Summary          ║"
          echo "╚══════════════════════════════════════════════════╝"
          tail -40 tests/selenium/selenium-output.txt || true

      # ── 9. Upload artifacts ───────────────────────────────────────────────────
      - name: Upload Selenium HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-html-report
          path: tests/selenium/selenium-report.html

      - name: Upload raw test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-log
          path: tests/selenium/selenium-output.txt
